name: "Prova Run Action"
description: "GitHub Action to run a Prova acceptance/integration test suite https://github.com/prova-rs/prova"
branding:
  icon: "check-circle"
  color: "blue"
inputs:
  version:
    description: The Prova version to install (https://github.com/prova-rs/prova/releases)
    required: false
    default: "v0.1.1"
  paths:
    description: Files or directories to run. Omit to run the suite declared in the manifest.
    required: false
    default: ""
  manifest:
    description: Path to the suite manifest.
    required: false
    default: "prova.toml"
  profile:
    description: Manifest profile to run (prova --profile <profile>).
    required: false
    default: ""
  jobs:
    description: Run up to N units concurrently.
    required: false
    default: ""
  format:
    description: "Output format: console or json."
    required: false
    default: "console"
  working-directory:
    description: Directory to run prova from.
    required: false
    default: "."
  args:
    description: Additional command-line arguments appended to the prova invocation.
    required: false
    default: ""
  plugins:
    description: |
      Ad-hoc plugins to register, one `name = source` per line, layered over the manifest.
      Source is a path, a git URL, or an org/repo shorthand — e.g. `redis = acme/prova-redis@v1`.
    required: false
    default: ""
  cache-plugins:
    description: Cache fetched git plugins (~/.cache/prova/plugins) across runs. Set "false" to disable.
    required: false
    default: "true"
runs:
  using: "composite"
  steps:
    - name: Install Prova
      shell: bash
      env:
        VERSION: ${{ inputs.version }}
      run: |
        set -euo pipefail

        # Match the archive to the runner. Prova publishes linux-x86_64, linux-arm64 and
        # macos-arm64 tarballs; anything else has no release archive to install.
        case "$(uname -s)" in
          Linux)  platform=linux ;;
          Darwin) platform=macos ;;
          *) echo "::error::prova-rs/run-action supports Linux and macOS runners only"; exit 1 ;;
        esac
        case "$(uname -m)" in
          x86_64|amd64)  arch=x86_64 ;;
          aarch64|arm64) arch=arm64 ;;
          *) echo "::error::unsupported runner architecture $(uname -m)"; exit 1 ;;
        esac
        if [ "$platform" = "macos" ] && [ "$arch" = "x86_64" ]; then
          echo "::error::Prova publishes no macos-x86_64 archive; use an arm64 macOS runner"
          exit 1
        fi

        prefix="prova-${VERSION}-${platform}-${arch}"
        archive="${prefix}.tar.gz"
        echo "Downloading ${archive}"
        cd "${RUNNER_TEMP}"
        curl --fail --silent --show-error -LO \
          "https://github.com/prova-rs/prova/releases/download/${VERSION}/${archive}"
        tar -xzf "${archive}"
        mv "./${prefix}/prova" .
        chmod +x ./prova
        # Put prova on PATH so later steps in the job can invoke it directly too.
        echo "${RUNNER_TEMP}" >> "$GITHUB_PATH"

    # Reuse fetched git plugins across runs. Prova pins each plugin by ref and clones into
    # ~/.cache/prova/plugins (XDG cache, same path on Linux and macOS), so a warm cache skips the
    # clone. Keyed on the manifest so a changed plugin pin invalidates it; restore-keys warm-starts
    # from any prior cache so only the changed plugins re-fetch.
    - name: Cache Prova plugins
      if: ${{ inputs.cache-plugins == 'true' }}
      uses: actions/cache@v4
      with:
        path: ~/.cache/prova/plugins
        key: prova-plugins-${{ runner.os }}-${{ hashFiles(format('{0}/{1}', inputs.working-directory, inputs.manifest)) }}
        restore-keys: |
          prova-plugins-${{ runner.os }}-

    - name: Run Prova
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      env:
        PATHS: ${{ inputs.paths }}
        MANIFEST: ${{ inputs.manifest }}
        PROFILE: ${{ inputs.profile }}
        JOBS: ${{ inputs.jobs }}
        FORMAT: ${{ inputs.format }}
        EXTRA_ARGS: ${{ inputs.args }}
        PLUGINS: ${{ inputs.plugins }}
      run: |
        set -euo pipefail

        flags=(--format "${FORMAT}")
        # Explicit paths bypass the manifest entirely, so only pass --manifest/--profile
        # when the run is manifest-driven.
        if [ -n "${PATHS}" ]; then
          :
        else
          flags+=(--manifest "${MANIFEST}")
          if [ -n "${PROFILE}" ]; then flags+=(--profile "${PROFILE}"); fi
        fi
        if [ -n "${JOBS}" ]; then flags+=(--jobs "${JOBS}"); fi

        # Expand the `plugins` input (one `name = source` per line) into --plugin flags. Trim
        # surrounding whitespace and normalize `name = source` to the `name=source` prova expects.
        while IFS= read -r line; do
          line="$(printf '%s' "$line" | sed 's/^[[:space:]]*//; s/[[:space:]]*$//')"
          [ -z "$line" ] && continue
          flags+=(--plugin "$(printf '%s' "$line" | sed 's/[[:space:]]*=[[:space:]]*/=/')")
        done <<< "${PLUGINS}"

        # Word-split PATHS and EXTRA_ARGS the way a shell command line would.
        "${RUNNER_TEMP}/prova" "${flags[@]}" ${EXTRA_ARGS} ${PATHS}
